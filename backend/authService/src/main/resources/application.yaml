server:
  port: 8081

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/medicnote_auth?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:jagadhesh.85131@gmail.com}
    password: ${MAIL_PASSWORD:hnod tpdh stxd mqhs}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: AUTH-SERVICE:8081
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}

logging:
  level:
    root: INFO
    com.MedicNote.authService: INFO

jwt:
  secret: ${JWT_SECRET:k2x7ieCfxLcw5us4+mP+7tspXHhVfGn+kzVVheSrsT0=}
  expiration: ${JWT_EXPIRATION:86400000}

otp:
  expiry-minutes: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
