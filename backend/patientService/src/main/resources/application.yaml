server:
  port: 8083

spring:
  application:
    name: PATIENT-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/medicnote_patient
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    instance-id: PATIENT-SERVICE:8083
    prefer-ip-address: false

logging:
  level:
    root: INFO
    com.MedicNote.doctorService: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN

jwt:
  secret: mysupersecretkeymysupersecretkey123456
  expiration: 86400000   # 1 day in ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html